<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数据库管理</title>
<style>
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#242836;--border:#2e3348;--text:#e4e6f0;--text2:#8b8fa8;--accent:#6c5ce7;--accent2:#a29bfe;--green:#00b894;--red:#ff6b6b;--radius:12px;--shadow:0 2px 16px rgba(0,0,0,.25)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:20px}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.header h1{font-size:20px}.header h1 span{color:var(--accent2)}
.btn{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .2s}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent2)}
.btn-danger{background:rgba(255,107,107,.15);color:var(--red);border:1px solid rgba(255,107,107,.3)}
.btn-sm{padding:5px 12px;font-size:12px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;color:var(--text);font-family:'SF Mono',Monaco,Consolas,monospace;font-size:13px;resize:vertical;min-height:80px;outline:none}
textarea:focus{border-color:var(--accent)}
.quick-btns{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}
.table-wrap{overflow-x:auto;max-height:500px;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{position:sticky;top:0;background:var(--surface2);text-align:left;padding:10px 12px;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
tbody td{padding:8px 12px;border-bottom:1px solid var(--border);white-space:nowrap;max-width:300px;overflow:hidden;text-overflow:ellipsis}
tbody tr:hover{background:var(--surface2)}
.info{color:var(--text2);font-size:13px;margin:8px 0}
.info b{color:var(--green)}
.toast{position:fixed;bottom:20px;right:20px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 18px;font-size:13px;box-shadow:var(--shadow);z-index:999;opacity:0;transform:translateY(20px);transition:all .3s}
.toast.show{opacity:1;transform:translateY(0)}.toast.success{border-left:4px solid var(--green)}.toast.error{border-left:4px solid var(--red)}
</style>
</head>
<body>
<div class="header">
  <h1>🗄️ <span>数据库</span>管理</h1>
  <div style="display:flex;gap:8px">
    <a href="/" class="btn btn-sm" style="background:var(--surface2);color:var(--text2);text-decoration:none;border:1px solid var(--border)">← 返回系统</a>
    <button class="btn btn-sm btn-primary" onclick="loadTables()">🔄 刷新</button>
  </div>
</div>

<div class="card">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
    <b>SQL 查询</b>
    <span class="info">支持 SELECT / INSERT / UPDATE / DELETE / CREATE / DROP</span>
  </div>
  <textarea id="sql" rows="3" placeholder="SELECT * FROM transactions LIMIT 100;"></textarea>
  <div class="quick-btns">
    <button class="btn btn-sm btn-primary" onclick="runQuery()">▶ 执行</button>
    <button class="btn btn-sm" style="background:var(--surface2);color:var(--text2);border:1px solid var(--border)" onclick="setSql('SELECT * FROM transactions ORDER BY id DESC LIMIT 100')">📋 全部记录</button>
    <button class="btn btn-sm" style="background:var(--surface2);color:var(--text2);border:1px solid var(--border)" onclick="setSql('SELECT * FROM categories')">📂 分类</button>
    <button class="btn btn-sm" style="background:var(--surface2);color:var(--text2);border:1px solid var(--border)" onclick="setSql('SELECT * FROM users')">👤 用户</button>
    <button class="btn btn-sm" style="background:var(--surface2);color:var(--text2);border:1px solid var(--border)" onclick="setSql('SELECT date, type, category, SUM(amount) as total, COUNT(*) as cnt FROM transactions GROUP BY date, type, category ORDER BY date DESC')">📊 统计</button>
    <button class="btn btn-sm btn-danger" onclick="if(confirm('确定清空所有交易记录？'))setSql('DELETE FROM transactions')">🗑️ 清空交易</button>
  </div>
</div>

<div id="resultArea"></div>

<div class="card" id="tablesCard">
  <b>📋 数据表</b>
  <div id="tableList" style="margin-top:12px"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const AUTH = JSON.parse(localStorage.getItem('shop_auth') || sessionStorage.getItem('shop_auth') || 'null');
if (!AUTH || !AUTH.token) { window.location.href = '/login.html'; }

function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast ' + type + ' show';
  setTimeout(() => t.className = 'toast', 2500);
}

function setSql(sql) { document.getElementById('sql').value = sql; }

async function runQuery() {
  const sql = document.getElementById('sql').value.trim();
  if (!sql) return showToast('请输入 SQL 语句', 'error');
  try {
    const res = await fetch('/api/db/query', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sql })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || '查询失败');
    renderResult(data);
    showToast('执行成功' + (data.changed !== undefined ? '，影响 ' + data.changed + ' 行' : ''));
    loadTables();
  } catch (e) { showToast(e.message, 'error'); }
}

function renderResult(data) {
  const area = document.getElementById('resultArea');
  if (!data.rows || data.rows.length === 0) {
    area.innerHTML = '<div class="card"><span class="info">查询返回 0 条记录</span></div>';
    return;
  }
  const cols = Object.keys(data.rows[0]);
  let html = '<div class="card"><span class="info">返回 <b>' + data.rows.length + '</b> 条记录</span><div class="table-wrap"><table><thead><tr>';
  cols.forEach(c => html += '<th>' + c + '</th>');
  html += '</tr></thead><tbody>';
  data.rows.forEach(r => {
    html += '<tr>';
    cols.forEach(c => html += '<td title="' + String(r[c] ?? '').replace(/"/g, '&quot;') + '">' + (r[c] ?? 'NULL') + '</td>');
    html += '</tr>';
  });
  html += '</tbody></table></div></div>';
  area.innerHTML = html;
}

async function loadTables() {
  try {
    const res = await fetch('/api/db/tables');
    const data = await res.json();
    const div = document.getElementById('tableList');
    if (!data.tables || data.tables.length === 0) { div.innerHTML = '<span class="info">无数据表</span>'; return; }
    div.innerHTML = data.tables.map(t => 
      '<div style="display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--border)">' +
      '<b>' + t.name + '</b>' +
      '<span class="info">' + t.columns + ' 列 · ' + t.rows + ' 行</span>' +
      '<button class="btn btn-sm" style="background:var(--surface2);color:var(--text2);border:1px solid var(--border)" onclick="setSql(\'SELECT * FROM ' + t.name + ' LIMIT 100\')">查看</button>' +
      '</div>'
    ).join('');
  } catch (e) { console.error(e); }
}

loadTables();
</script>
</body>
</html>
